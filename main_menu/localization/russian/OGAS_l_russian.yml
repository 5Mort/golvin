 OGAS_Complete_desc: "[proximity]: [THIS.GetLocation.GetProximityToOwnerCapital|2W]\nДалее дорог не требуется"
 OGAS_Ongoing_desc: "[proximity]: [THIS.GetLocation.GetProximityToOwnerCapital|2W] (Current) / [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Ongoing').GetValue|2W] (Optimal)\nTarget: $build_roads$ towards [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Source').GetLocation.GetName]"
 OGAS_Cannot_Reach_desc: "невозможно повысить [proximity] выше 0"
 OGAS_Complete_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n[market_access]: [THIS.GetLocation.GetMarketAccess|2%V]\nnДалее дорог не требуется"
 OGAS_Ongoing_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n[market_access]: [THIS.GetLocation.GetMarketAccess|2%V] (Current) / [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Ongoing').GetValue|2%V] (Optimal)\nTarget: $build_roads$ toward [THIS.GetLocation.MakeScope.GetVariable('OGAS_Cache_Auto_Road_Source').GetLocation.GetName]"
 OGAS_Cannot_Reach_Market_Access_desc: "@market![THIS.GetLocation.GetMarket.GetName]\n невозможно повысить [market_access] выше 0"
 OGAS_Introduction_Title: "OGAS"
 OGAS_Introduction: "После активации OGAS оценивает каждое принадлежащюю [location|e] чтобы определить оптимальный [road|e] план, и начинает $build_roads$ на основе потенциальных преимуществ.\n План движения пересчитывается только после того, как вы вручную нажмете на кнопку. $RESET_BUTTON$.\n Примечание: Наведите курсор [locations] для предварительного ознакомления с планом дороги."
 OGAS_Auto_Road_Initialize_Button: "$RESET_BUTTON$ [road] План"
 OGAS_Auto_Road_Initialize_TT: "Если [proximity|e] изменяется (например, завершено строительство новой [road|e], изменяется[maritime_presence|e]  и т.д.), нажмите здесь, чтобы пересчитать маршрут для более точного плана дороги. Примечание: убедитесь что нажмите здесь после изучения [advance|e] дороги!!"
 OGAS_Auto_Road_Proximity_Button: "[proximity] Режим"
 OGAS_Auto_Road_Market_Access_Button: "[market_access] Режим"
 OGAS_Auto_Road_Construct_Button_Text: "Автоматизация дорожного строительства"
 OGAS_Auto_Road_Construct_Toggle_Enable: "Автоматизация дорожного строительства включена"
 OGAS_Auto_Road_Construct_Toggle_Disable: "Автоматизация дорожного строительства отключена"
 OGAS_Auto_Road_Min_Gold_Text: "Золото, которое нужно сохранить: [GetPlayer.MakeScope.GetVariable('OGAS_Auto_Road_Min_Gold').GetValue|0Y]@gold!"