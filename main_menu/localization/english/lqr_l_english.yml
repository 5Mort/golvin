gold_desq_RGO: "The gold to save is the amount of gold that must be available before any auto-expansion can occur. An RGO will not auto-expand if the gold to save plus the estimate cost of the next level is greater than the country's current ducats. Put another way, the amount of gold you will have will never drop below the gold to save value."
Update_Province_Cache: "Update Province Cache"
Update_Province_Cache_desq: "Press this button to update the cache of which provinces have at least one location with auto-expand RGO on."
Click_once: "Click once if the game seems slower since the auto-expand RGO update or if the mod is auto-expanding an RGO before it's fully employed and it should hopefully fix it."
This_should: "This should not be needed regularly."